<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Admin - Império AR</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .status.waiting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .status.connecting {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        #qrCode {
            text-align: center;
            margin: 30px 0;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #dee2e6;
        }
        
        #qrCode img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
        }
        
        #qrCode p {
            color: #999;
            font-size: 14px;
        }
        
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }
        
        .info-box strong {
            color: #333;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📱</div>
            <h1>WhatsApp</h1>
            <p>Painel de Administração</p>
        </div>
        
        <div id="status" class="status waiting">
            ⏳ Aguardando Conexão...
        </div>
        
        <div id="qrCode">
            <p>QR Code será exibido aqui</p>
        </div>
        
        <div id="phoneInfo" style="display: none;" class="info-box">
            <strong>Número Conectado:</strong><br>
            <span id="phoneNumber"></span>
        </div>
        
        <div class="buttons">
            <button id="startBtn" class="btn-primary" onclick="startSession()">
                Conectar WhatsApp
            </button>
            <button id="logoutBtn" class="btn-secondary" onclick="logout()" style="display: none;">
                Desconectar
            </button>
        </div>
        
        <div class="footer">
            <p>© 2026 Império AR - Refrigeração</p>
            <p>Sistema Unificado v2.0</p>
        </div>
    </div>

    <script>
        const socket = io();
        let sessionId = 'default';
        
        socket.on('connect', () => {
            console.log('✓ Conectado ao servidor WebSocket');
        });
        
        socket.on('qr', (data) => {
            console.log('QR Code recebido');
            updateStatus('connecting', 'Escaneie o QR Code com seu WhatsApp', true);
            
            const qrContainer = document.getElementById('qrCode');
            qrContainer.innerHTML = '';
            
            const img = document.createElement('img');
            img.src = data.qr;
            img.style.padding = '20px';
            qrContainer.appendChild(img);
        });
        
        socket.on('ready', (data) => {
            console.log('✓ WhatsApp conectado');
            updateStatus('connected', `✓ Conectado com sucesso!`, false);
            
            document.getElementById('phoneNumber').textContent = data.phoneNumber;
            document.getElementById('phoneInfo').style.display = 'block';
            
            const qrContainer = document.getElementById('qrCode');
            qrContainer.innerHTML = '<p style="color: #28a745;">✓ WhatsApp conectado com sucesso!</p>';
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'block';
        });
        
        socket.on('disconnected', () => {
            console.log('✗ WhatsApp desconectado');
            updateStatus('waiting', '⏳ Desconectado. Clique em Conectar.', true);
            document.getElementById('phoneInfo').style.display = 'none';
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'none';
        });
        
        socket.on('auth_failure', () => {
            updateStatus('error', '✗ Falha na autenticação. Tente novamente.', true);
        });
        
        function updateStatus(statusClass, message, showSpinner = false) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + statusClass;
            
            if (showSpinner) {
                statusEl.innerHTML = '<span class="spinner"></span> ' + message;
            } else {
                statusEl.textContent = message;
            }
        }
        
        async function startSession() {
            try {
                document.getElementById('startBtn').disabled = true;
                updateStatus('connecting', 'Iniciando sessão...', true);
                
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    console.log('Sessão iniciada:', data);
                    socket.emit('request-qr', sessionId);
                } else {
                    updateStatus('error', `✗ Erro: ${data.message}`, false);
                    document.getElementById('startBtn').disabled = false;
                }
            } catch (error) {
                console.error('Erro ao iniciar sessão:', error);
                updateStatus('error', `✗ Erro: ${error.message}`, false);
                document.getElementById('startBtn').disabled = false;
            }
        }
        
        async function logout() {
            if (!confirm('Tem certeza que deseja desconectar?')) return;
            
            try {
                const response = await fetch(`/api/logout/${sessionId}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                if (data.success) {
                    console.log('✓ Desconectado');
                }
            } catch (error) {
                console.error('Erro ao desconectar:', error);
            }
        }
        
        // Tentar reconectar automaticamente
        socket.on('reconnect', () => {
            console.log('✓ Reconectado ao servidor');
        });
    </script>
</body>
</html>
